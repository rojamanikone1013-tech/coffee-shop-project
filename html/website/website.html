<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coffee Shop</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#f5f5f5;
}

.hero{
background-image:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");
background-size:cover;
height:400px;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
}

.card img{
height:200px;
object-fit:cover;
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="#">Coffee Shop</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#menu1">Menu</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#contact">Contact</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- Hero Section -->

<div class="hero">
Welcome to Coffee Shop
</div>

<!-- Coffee Menu -->

<div class="container mt-5" id="menu1">

<h2 class="text-center mb-4">Our Coffee Menu</h2>

<div class="row">

<!-- Coffee 1 -->

<div class="col-md-4 mb-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" class="card-img-top">

<div class="card-body text-center">

<h5 class="card-title">Espresso</h5>

<p>Strong and classic coffee</p>

<button class="btn btn-dark">Order Now</button>

</div>

</div>

</div>

<!-- Coffee 2 -->

<div class="col-md-4 mb-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085" class="card-img-top">

<div class="card-body text-center">

<h5 class="card-title">Cappuccino</h5>

<p>Creamy and smooth coffee</p>

<button class="btn btn-dark">Order Now</button>

</div>

</div>

</div>

<!-- Coffee 3 -->

<div class="col-md-4 mb-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" class="card-img-top">

<div class="card-body text-center">

<h5 class="card-title">Latte</h5>

<p>Milk based delicious coffee</p>

<button class="btn btn-dark">Order Now</button>

</div>

</div>

</div>

</div>

</div>

<!-- Contact Section -->

<div class="container mt-5" id="contact">

<h2 class="text-center mb-4">Contact Us</h2>

<div class="row justify-content-center">

<div class="col-md-6">

<form>

<div class="mb-3">

<label class="form-label">Name</label>

<input type="text" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Email</label>

<input type="email" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Message</label>

<textarea class="form-control"></textarea>

</div>

<button class="btn btn-primary w-100">Send Message</button>

</form>

</div>

</div>

</div>

<!-- Footer -->

<footer>

<p>© 2026 Coffee Shop | All Rights Reserved</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
